<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Early error interception to swallow harmless cross-origin / ResizeObserver errors
      (function() {
        const isHarmless = (msg) => {
          if (!msg) return false;
          const s = String(msg).toLowerCase();
          return s.includes('script error') || s.includes('resizeobserver') || s.includes('failed to fetch dynamically imported module');
        };

        const originalOnError = window.onerror;
        window.onerror = function (message, source, lineno, colno, error) {
          if (isHarmless(message) || isHarmless(error)) {
            return true; // Swallow
          }
          if (originalOnError) {
            return originalOnError.apply(this, arguments);
          }
          return false;
        };

        window.addEventListener('error', function (e) {
          const msg = e.message || '';
          const errStr = e.error ? String(e.error) : '';
          if (isHarmless(msg) || isHarmless(errStr)) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        }, true);

        window.addEventListener('unhandledrejection', function (e) {
          const reason = e.reason;
          const msg = (reason && typeof reason === 'object' && 'message' in reason) ? reason.message : reason;
          if (isHarmless(reason) || isHarmless(msg)) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        }, true);

        // Intercept Vite's WebSocket messages to prevent logging harmless errors to the backend terminal
        const originalSend = WebSocket.prototype.send;
        WebSocket.prototype.send = function(data) {
          if (typeof data === 'string') {
            try {
              const parsed = JSON.parse(data);
              if (parsed.type === 'error' && parsed.err && isHarmless(parsed.err.message)) {
                return; // Drop the message
              }
            } catch (e) {
              // Ignore
            }
          }
          return originalSend.apply(this, arguments);
        };
      })();
    </script>
